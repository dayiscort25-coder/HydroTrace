        h('div', { className: 'sidebar-overlay' + (mobSidebar ? ' active' : ''), onClick: function() { setMobSidebar(false); } }),
        // Sidebar
        h('div', { className: 'sidebar-mobile' + (mobSidebar ? ' open' : '') },
          h(window.Sidebar, { currentPage: currentPage, onNavigate: handleNavigate, user: user, onLogout: handleLogout, darkMode: darkMode, toggleDark: toggleDark })
        ),
        currentPage === 'home' && h(window.HomePage, { onNavigate: handleNavigate, onRunScenario: handleRunScenario, user: user }),
        currentPage === 'single' && h(window.SingleSimulation, { preloadedParams: preloadedParams, savedState: singleState, onSaveState: setSingleState }),
        currentPage === 'multi' && h(window.MultiSimulation, { savedState: multiState, onSaveState: setMultiState }),
        currentPage === 'historial' && h(HistorialPage, { user: user }),
        currentPage === 'perfil' && h(ProfilePage, { user: user, onUpdateUser: handleUpdateUser, onNavigate: handleNavigate })
      );
    }

    // Render
    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>

</html>
